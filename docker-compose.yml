version: "3.8"

services:
  app:
    build: .
    container_name: nestjs-prisma-sqlite
    volumes:
      - .:/app
      - /app/node_modules
      - sqlite-data:/app/dev.db 
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/dev.db
    command: npm run start:dev
    user: "${UID}:${GID}"

volumes:
  sqlite-data: