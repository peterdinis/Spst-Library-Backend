version: "3.8"

services:
  app:
    build: .
    container_name: spst-library-container
    volumes:
      - .:/app
      - /app/node_modules
      - sqlite-data:/app
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/dev.db
    command: sh -c "npx prisma generate && npm run start:dev"
    user: "${UID}:${GID}"

volumes:
  sqlite-data:
