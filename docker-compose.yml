services:
  app:
    build: .
    container_name: spst-kniznica
    working_dir: /usr/src/app
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "file:./dev.db"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
    volumes:
      - ./:/usr/src/app 
    command: >
      sh -c "npx prisma generate &&
             npx prisma migrate deploy &&
             npm run start:dev"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: nestjs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
